<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: #fff;
    padding: 30px;
    border: 1px solid #000;
    width: 400px; /* 너비를 조정합니다 */
}

h1 {
    text-align: center;
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 5px;
}

input[type="text"],
input[type="password"],
input[type="email"],
input[type="tel"],
input[type="date"] {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 10px;
}

button {
    width: 100%;
    padding: 10px;
}

</style>
</head>
<body>
    <div class="container">
        <h1>회원가입</h1>
  
        <form action="/signup" method="POST">
            <div class="form-group">
                <label for="username">아이디:</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">비밀번호:</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="form-group">
                <label for="name">이름:</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-check">
                <label>성별</label>
                <input class="form-check-input" type="radio" name ="gender" value="" id="male">
 					 <label class="form-check-label" for="male">남성</label>
                   <input class="form-check-input" type="radio" name ="gender" value="" id="female">
 					 <label class="form-check-label" for="female">여성</label>
            </div>
            
            <div class="form-group">
                <label for="email">이메일:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="phone">전화번호:</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            
            <div class="form-group">
                <label for="birthday">생일:</label>
                <input type="date" id="birthday" name="birthday" required>
            </div>
            <button type="submit" class="btn btn-primary mb-3">가입하기</button>
        </form>
            
    </div>
</body>
</html>
</body>
</html>
